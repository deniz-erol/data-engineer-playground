version: 2

models:
  - name: dim_customers
    description: "Customer dimension table with descriptive attributes"
    columns:
      - name: customer_id
        description: "Primary key for customers"
        tests:
          - unique
          - not_null

  - name: dim_nation
    description: "Nation dimension table with descriptive attributes"
    columns:
      - name: nation_id
        description: "Primary key for nations"
        tests:
          - unique
          - not_null
      - name: nation_name
        description: "Name of the nation"
        tests:
          - not_null

  - name: fact_orders
    description: "Order fact table with one row per order"
    columns:
      - name: order_id
        description: "Primary key for orders"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to dim_customers"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

  - name: customer_metrics
    description: "Customer-level metrics with spending rank, order counts, and lifetime value"
    columns:
      - name: customer_id
        description: "Unique customer identifier"
        tests:
          - unique
          - not_null
      - name: spending_rank
        description: "Rank by total spending (1 = highest)"
        tests:
          - unique
          - not_null
  
  - name: nation_sales
    description: "Revenue and order metrics aggregated by nation"
    columns:
      - name: nation_name
        description: "Country name"
        tests:
          - unique
          - not_null

  - name: monthly_revenue
    description: "Monthly revenue, order count, and average order value (time-series)"
    columns:
      - name: order_month
        description: "First day of the month (month bucket)"
        tests:
          - unique
          - not_null

  - name: customer_segments
    description: "Customer segmentation based on spending quartiles"
    columns:
      - name: customer_id
        description: "Unique customer identifier"
        tests:
          - unique
          - not_null
      - name: customer_segment
        description: "Segment label based on spending quartiles"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['High Value', 'Regular', 'Occasional', 'Low Value', 'Never Purchased']
